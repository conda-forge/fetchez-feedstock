schema_version: 1

context:
  name: fetchez
  version: "0.4.3"

package:
  name: ${{ name | lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: 660fc6e1eacb93e25f6eef88f4a94fcfc0ba0c524b5e71afe47084b316ac47db

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - fetchez = fetchez.cli:fetchez_cli

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.5.0
    - hatch-vcs
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - requests
    - lxml
    - tqdm
    - shapely
    - pyyaml

tests:
  - python:
      python_version: "${{ python_min }}.*"
      pip_check: true
      imports:
        - fetchez
  - script:
      - fetchez --help
      - fetchez --modules
    requirements:
      run:
        - python ${{ python_min }}.*

about:
  homepage: https://github.com/ciresdem/fetchez
  summary: |
    Fetchez is a lightweight, modular Python library and command-line tool
    designed to discover and download geospatial data from a wide variety of
    public repositories.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - matth-love
    - mfisher87
