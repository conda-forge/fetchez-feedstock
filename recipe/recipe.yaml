schema_version: 1

context:
  name: fetchez
  version: "0.6.5"
  python_min: "3.12"

package:
  name: ${{ name | lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: dba2ccfd682f1b35d62b9b4a691455217d6c8258c1c1a56f55f195eb2c411cd5

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - fetchez = fetchez.cli:cli

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.5.0
    - hatch-vcs
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - requests
    - lxml
    - tqdm
    - shapely
    - pyyaml
    - click

tests:
  - python:
      python_version: "${{ python_min }}.*"
      pip_check: true
      imports:
        - fetchez
  - script:
      - fetchez --help
      - fetchez modules list
    requirements:
      run:
        - python ${{ python_min }}.*

about:
  homepage: https://github.com/ciresdem/fetchez
  summary: |
    Fetchez is a lightweight, modular Python library and command-line tool
    designed to discover and download geospatial data from a wide variety of
    public repositories.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - matth-love
    - mfisher87
